{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <h1 class="text-center mb-5 glow-text">PANELS INFORMATION</h1>
    
    <div class="row g-4 justify-content-center">
        {% for panel in panels %}
        <div class="col-md-6 col-lg-4">
            <div class="cyber-card p-4 h-100 text-center border-cyan shadow-glow d-flex flex-column">
                <!-- Panel Name -->
                <h3 class="text-cyan mb-2 text-uppercase">{{ panel.name }}</h3>
                
                <!-- Year -->
                <p class="text-orange small mb-3 fw-bold">{{ panel.year }}</p>
                
                <!-- Description -->
                <p class="text-muted small help-text flex-grow-1 mb-3">{{ panel.description|truncatewords:25 }}</p>
                
                <!-- Members Count Badge -->
                <div class="mb-3">
                    <span class="badge bg-dark border border-cyan text-cyan px-3 py-2">
                        <i class="bi bi-people me-1"></i>{{ panel.members.count }} Members
                    </span>
                </div>
                
                <!-- Action Button -->
                <div class="mt-auto">
                    <a href="{% url 'panel_detail' panel.id %}" class="btn btn-outline-cyber w-100">
                        <i class="bi bi-arrow-right me-1"></i>View Members
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
